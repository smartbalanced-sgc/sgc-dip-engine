name: SGC Dip Engine - Daily Run

on:
  schedule:
    # Run at 21:30 UTC (9:30 PM BST in summer, 9:30 PM GMT in winter)
    # Adjust to 20:30 UTC during winter months
    - cron: '30 21 * * 1-5'  # Mon-Fri only
  
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run SGC Dip Engine
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python main.py
      
      - name: Commit and push dashboard
        run: |
          git config --global user.name 'SGC Dip Engine Bot'
          git config --global user.email 'bot@sgc-dip-engine.local'
          git add docs/index.html
          git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
