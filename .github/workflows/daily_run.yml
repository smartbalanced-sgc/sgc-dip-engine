name: SGC Dip Engine - Daily Run

on:
  schedule:
    - cron: '30 21 * * 1-5'
  
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run SGC Dip Engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python main.py
      
      - name: Commit and push dashboard
        run: |
          git config --global user.name 'SGC Dip Engine Bot'
          git config --global user.email 'bot@sgc-dip-engine.local'
          git add -A
          git diff --cached --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M UTC')"
          git push
