
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGC Dip Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #e8eaed;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1f35 0%, #2d3548 100%);
            border-radius: 12px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #4a9eff;
        }
        
        .header .meta {
            font-size: 0.9em;
            color: #a0a5b0;
        }
        
        .regime {
            display: inline-block;
            padding: 4px 12px;
            background: #2d3548;
            border-radius: 6px;
            margin-left: 10px;
            font-weight: 600;
        }
        
        .deployment {
            background: #1a1f35;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid #4a9eff;
        }
        
        .deployment h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #4a9eff;
        }
        
        .deployment-row {
            display: flex;
            gap: 40px;
            margin-bottom: 10px;
        }
        
        .deployment-row strong {
            color: #4a9eff;
            min-width: 150px;
        }
        
        .buy-list {
            color: #66bb6a;
        }
        
        .wait-list {
            color: #ffa726;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1f35;
            border-radius: 12px;
            overflow: hidden;
        }
        
        thead {
            background: #2d3548;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #4a9eff;
            border-bottom: 2px solid #3a4556;
        }
        
        tr {
            border-bottom: 1px solid #2d3548;
        }
        
        tr:last-child {
            border-bottom: none;
        }
        
        td {
            padding: 20px 15px;
            vertical-align: top;
        }
        
        .ticker {
            font-weight: 700;
            font-size: 1.1em;
            color: #4a9eff;
        }
        
        .signal-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .signal-icon {
            font-size: 1.3em;
        }
        
        .signal-text {
            font-weight: 700;
            font-size: 1.1em;
        }
        
        .price-row {
            color: #e8eaed;
            margin-bottom: 6px;
        }
        
        .target-row {
            color: #ffa726;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        .confidence-row {
            color: #a0a5b0;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        
        .oneliner {
            background: #2d3548;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9em;
            color: #b0b5c0;
            font-style: italic;
            margin-top: 8px;
        }
        
        .earnings {
            text-align: center;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .deployment-row {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SGC DIP ENGINE</h1>
            <div class="meta">
                Last Run: Apr 22, 2026 08:04 AM BST 
                <span class="regime">Market: NEUTRAL (VIX 18.0)</span>
            </div>
            <div class="meta" style="margin-top: 8px;">
                Window: 60 days remaining (ends Jun 21, 2026)
            </div>
        </div>
        
        <div class="deployment">
            <h2>TODAY'S DEPLOYMENT (Apr 22)</h2>
            <div class="deployment-row">
                <strong>BUY TODAY (0):</strong>
                <span class="buy-list">None</span>
            </div>
            <div class="deployment-row">
                <strong>WAIT FOR DIP (0):</strong>
                <span class="wait-list">None</span>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Stock</th>
                    <th>Signal & Target</th>
                    <th>Earnings</th>
                </tr>
            </thead>
            <tbody>
                
            </tbody>
        </table>
    </div>
</body>
</html>
